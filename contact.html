<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Contact</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="css/style.css">

</head>

<body>

<section class="contact-section">

<div class="container">

<h1 class="text-center mb-5">
Contact Us
</h1>

<form
class="contact-form"
onsubmit="return validateContactForm()">

<div class="mb-3">

<label>Name</label>

<input
type="text"
id="name"
class="form-control">

</div>

<div class="mb-3">

<label>Email</label>

<input
type="email"
id="email"
class="form-control">

</div>

<div class="mb-3">

<label>Message</label>

<textarea
id="message"
rows="5"
class="form-control"></textarea>

</div>

<button
type="submit"
class="btn btn-primary">

Submit

</button>

</form>

</div>

</section>

<script src="js/main.js"></script>

</body>

</html>
